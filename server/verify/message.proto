syntax = "proto3";

package message;

service VarifyService {
  // 生成或复用邮箱验证码。
  rpc GetVarifyCode(GetVarifyReq) returns (GetVarifyRsp) {}
}

message GetVarifyReq {
  string email = 1; // 接收验证码的邮箱地址
}

message GetVarifyRsp {
  int32 error = 1;  // 统一业务错误码
  string email = 2; // 对应请求的邮箱地址
  string code = 3;  // 开发模式下返回的验证码
}

message GetChatServerReq {
  int32 uid = 1; // 请求连接节点的用户 ID
}

message GetChatServerRsp {
  int32 error = 1;  // 统一业务错误码
  string host = 2;  // 客户端连接节点地址
  string port = 3;  // 客户端连接节点端口
  string token = 4; // 客户端连接凭证
}

message LoginReq {
  int32 uid = 1;    // 登录用户 ID
  string token = 2; // 待校验的登录凭证
}

message LoginRsp {
  int32 error = 1;  // 统一业务错误码
  int32 uid = 2;    // 登录用户 ID
  string token = 3; // 校验后的登录凭证
}

service StatusService {
  // 兼容旧客户端的 Chat 节点发现接口。
  rpc GetChatServer(GetChatServerReq) returns (GetChatServerRsp) {}
  // 兼容旧客户端的 token 登录接口。
  rpc Login(LoginReq) returns (LoginRsp);
}
