syntax = "proto3";
package state;

// Auth Gate 请求为某个用户选择连接节点。
message ConnectUser {
  int32 id = 1; // 用户 ID；用于轮询/亲和选择
}

message ConnectUserRsp {
  string ip = 1;      // 客户端可连接的节点地址
  int32 port = 2;     // 客户端可连接的 TCP 端口
  string node_id = 3; // 被选中的 Gateway/旧 IM 节点 ID
}

// Gateway 拉取 Message 拓扑时携带的本地版本。
message TopologyRequest {
  uint64 known_version = 1; // Gateway 当前已知的拓扑版本
}

// State 返回的单个服务节点描述。
message ServiceNode {
  string node_id = 1; // 稳定节点 ID
  string host = 2;    // 节点内网主机地址
  int32 port = 3;     // Gateway-Message 流端口
  string status = 4;  // 节点状态，如 active
  uint32 weight = 5;  // 预留路由权重
}

// 带版本号的完整 Message 节点快照。
message MessageTopology {
  uint64 topology_version = 1; // State 当前拓扑版本
  repeated ServiceNode nodes = 2; // 当前可见的 Message 节点列表
}

message TestNetwork {
  string msg = 1; // 网络探测的请求/响应文本
}

service StateService {
  // 为客户端选择 Connection Gateway。
  rpc PickConnectionGateway(ConnectUser) returns (ConnectUserRsp) {}
  // 返回版本化 Message 节点拓扑。
  rpc ListMessageNodes(TopologyRequest) returns (MessageTopology) {}
  // 兼容旧客户端的 Chat 节点选择接口。
  rpc GetImServer(ConnectUser) returns (ConnectUserRsp) {}
  // 兼容旧拓扑的备用 Chat 激活接口。
  rpc ActiveImBackupServer(ConnectUser) returns (ConnectUserRsp) {}
  // 兼容旧拓扑的网络探测接口。
  rpc TestNetworkPing(TestNetwork) returns (TestNetwork) {}
}
