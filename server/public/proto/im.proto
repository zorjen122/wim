syntax = "proto3";

package im;

// 旧 Message 节点间健康检查请求。
message ActiveRequest {
  string null = 1; // 兼容旧协议的占位内容
}

// 旧 Message 节点间健康检查响应。
message ActiveResponse {
  string error = 1; // 空字符串表示成功，否则为错误描述
}

// 旧 Message-to-Message 好友申请通知。
message NotifyAddFriendRequest {
  int64 from = 1;          // 申请人用户 ID
  int64 to = 2;            // 被申请人用户 ID
  string requestMessage = 3; // 好友申请附言
}

// status字段既用于回复请求的状态，也用于错误状态

message NotifyAddFriendResponse {
  int64 from = 1;     // 申请人用户 ID
  int64 to = 2;       // 被申请人用户 ID
  string status = 3;  // 通知处理状态或错误描述
}

// 旧 Message-to-Message 好友申请回复。
message ReplyAddFriendRequest {
  int64 from = 1;         // 原申请人用户 ID
  int64 to = 2;           // 回复人用户 ID
  bool accept = 3;        // 是否同意好友申请
  string replyMessage = 4; // 回复附言
}

message ReplyAddFriendResponse {
  string status = 1; // 回复处理状态或错误描述
}

// 旧 Message-to-Message 文本转发请求。
message TextSendMessageRequest {
  int64 from = 1;        // 发送者用户 ID
  int64 to = 2;          // 接收者用户 ID
  string text = 3;       // 文本消息内容
  int64 seq = 4;         // 客户端消息序号
  int64 session_key = 5; // 单聊会话 ID
  string request_id = 6; // TCP 命令与跨节点 RPC 的关联 ID
}

message TextSendMessageResponse {
  string status = 1;    // 文本转发处理状态
  int32 error = 2;      // 统一业务错误码
  int64 message_id = 3; // 目标 Message 生成并透传的消息 ID
}

service ImService {
  // 旧 Message 节点健康检查。
  rpc ActiveService(ActiveRequest) returns (ActiveResponse);
  // 旧 Message 节点间好友申请通知。
  rpc NotifyAddFriend(NotifyAddFriendRequest) returns (NotifyAddFriendResponse);
  // 旧 Message 节点间好友申请回复。
  rpc ReplyAddFriend(ReplyAddFriendRequest) returns (ReplyAddFriendResponse);
  // 旧 Message 节点间文本消息转发。
  rpc TextSendMessage(TextSendMessageRequest) returns (TextSendMessageResponse);
}
